<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="Seguimiento del dólar en Argentina con alertas personalizadas">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dólar AR">
  <title>Dólar AR</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dark">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <span class="logo">💵</span>
      <h1 class="app-title">Dólar AR</h1>
    </div>
    <div class="header-right">
      <button id="notif-btn" class="btn-icon" title="Activar notificaciones" aria-label="Activar notificaciones">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button id="theme-btn" class="btn-icon" title="Cambiar tema" aria-label="Cambiar tema">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Status bar ─────────────────────────────────────────────── -->
  <div class="status-bar">
    <div class="update-status">
      <span class="status-dot loading"></span>
      <span id="update-text">Cargando cotizaciones...</span>
    </div>
    <button id="refresh-btn" class="btn-refresh" title="Actualizar ahora" aria-label="Actualizar">↻</button>
  </div>

  <main class="main">

    <!-- ── Cotizaciones ─────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-title">Cotizaciones en tiempo real</h2>
      <div id="cotizaciones-grid" class="cotizaciones-grid" role="list">
        <div class="card skeleton" role="listitem"></div>
        <div class="card skeleton" role="listitem"></div>
        <div class="card skeleton" role="listitem"></div>
        <div class="card skeleton" role="listitem"></div>
      </div>
    </section>

    <!-- ── Historial ────────────────────────────────────────────── -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Historial 24hs</h2>
        <div class="chart-controls">
          <select id="chart-tipo" class="select-sm" aria-label="Tipo de dólar">
            <option value="blue">Blue</option>
            <option value="oficial">Oficial</option>
            <option value="bolsa">MEP</option>
            <option value="contadoconliqui">CCL</option>
          </select>
          <select id="chart-campo" class="select-sm" aria-label="Precio">
            <option value="venta">Venta</option>
            <option value="compra">Compra</option>
          </select>
        </div>
      </div>
      <div class="chart-container" role="img" aria-label="Gráfico de historial">
        <canvas id="history-chart"></canvas>
        <div id="chart-empty" class="chart-empty hidden">
          <p>El historial se acumula automáticamente.<br>Estará disponible después de algunos ciclos de actualización.</p>
        </div>
      </div>
    </section>

    <!-- ── Alertas ──────────────────────────────────────────────── -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Mis alertas</h2>
        <button id="new-alert-btn" class="btn-primary btn-sm">+ Nueva alerta</button>
      </div>
      <div id="alerts-list" class="alerts-list" role="list"></div>
      <p id="alerts-empty" class="alerts-empty hidden">
        No tenés alertas configuradas. ¡Creá una para recibir notificaciones automáticas!
      </p>
    </section>

  </main>

  <!-- ── Modal: Nueva alerta ──────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog"
       aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Nueva alerta</h3>
        <button id="modal-close" class="btn-icon" aria-label="Cerrar">✕</button>
      </div>
      <form id="alert-form" class="modal-body" novalidate>
        <div class="form-group">
          <label for="alert-tipo">Tipo de dólar</label>
          <select id="alert-tipo" class="form-control" required>
            <option value="blue">Dólar Blue</option>
            <option value="oficial">Dólar Oficial</option>
            <option value="bolsa">Dólar MEP</option>
            <option value="contadoconliqui">Dólar CCL</option>
          </select>
        </div>
        <div class="form-group">
          <label for="alert-campo">Precio a monitorear</label>
          <select id="alert-campo" class="form-control" required>
            <option value="venta">Venta</option>
            <option value="compra">Compra</option>
          </select>
        </div>
        <div class="form-group">
          <label for="alert-condicion">Condición</label>
          <select id="alert-condicion" class="form-control" required>
            <option value="baja">Alertar si baja de… (para compra)</option>
            <option value="sube">Alertar si sube de… (para venta)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="alert-valor">Valor objetivo ($)</label>
          <div class="input-with-hint">
            <input id="alert-valor" type="number" class="form-control"
                   placeholder="Ej: 1050" min="1" step="0.01" required
                   aria-describedby="current-price-hint">
            <span id="current-price-hint" class="input-hint"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="alert-repeating">
            <span>Repetir alerta (notificar múltiples veces)</span>
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" id="cancel-alert" class="btn-secondary">Cancelar</button>
          <button type="submit" class="btn-primary">Crear alerta</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Toast container ─────────────────────────────────────────── -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ── Scripts ─────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/alerts.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/chart.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>

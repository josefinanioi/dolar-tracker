<!DOCTYPE html>
<html lang="es">
<!--
  Abrí este archivo en un navegador para generar los íconos PNG de la PWA.
  Hacé clic en "Descargar todos" y mové los archivos descargados a frontend/icons/
-->
<head>
  <meta charset="UTF-8">
  <title>Generador de íconos – Dólar AR</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #0f172a; color: #f1f5f9; }
    h1 { margin-bottom: 1rem; }
    .previews { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1.5rem 0; }
    canvas { border-radius: 8px; background: #1e293b; }
    button {
      background: #3b82f6; color: #fff; border: none; border-radius: 8px;
      padding: .6rem 1.4rem; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #2563eb; }
    p { color: #94a3b8; margin-top: 1rem; font-size: .9rem; }
  </style>
</head>
<body>
  <h1>💵 Generador de íconos PWA</h1>
  <p>Hacé clic en el botón para descargar todos los íconos y colocarlos en <code>frontend/icons/</code></p>
  <div id="previews" class="previews"></div>
  <button onclick="downloadAll()">⬇ Descargar todos los íconos</button>
  <p>Archivos generados: icon-72.png, icon-96.png, icon-128.png, icon-144.png, icon-152.png, icon-192.png, icon-384.png, icon-512.png</p>

  <script>
    const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];
    const BG    = '#1e293b';
    const FG    = '#f1f5f9';
    const ACC   = '#3b82f6';

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      const r = size * 0.16;

      // Background rounded rect
      ctx.fillStyle = BG;
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath(); ctx.fill();

      // Accent top bar
      ctx.fillStyle = ACC;
      ctx.fillRect(0, 0, size, size * 0.06);

      // Dollar sign
      ctx.fillStyle = FG;
      ctx.font = `bold ${size * 0.52}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', size / 2, size / 2 + size * 0.03);

      // "AR" label
      ctx.fillStyle = ACC;
      ctx.font = `bold ${size * 0.16}px -apple-system, sans-serif`;
      ctx.fillText('AR', size / 2, size * 0.82);

      return canvas;
    }

    const previews = document.getElementById('previews');
    const canvases = {};

    SIZES.forEach(size => {
      const c = drawIcon(size);
      canvases[size] = c;
      if (size <= 192) {
        const wrap = document.createElement('div');
        wrap.style.textAlign = 'center';
        const label = document.createElement('p');
        label.textContent = `${size}px`;
        label.style.marginBottom = '.3rem';
        wrap.appendChild(label);
        wrap.appendChild(c);
        previews.appendChild(wrap);
      }
    });

    function downloadAll() {
      SIZES.forEach(size => {
        const a = document.createElement('a');
        a.href = canvases[size].toDataURL('image/png');
        a.download = `icon-${size}.png`;
        a.click();
      });
    }
  </script>
</body>
</html>
